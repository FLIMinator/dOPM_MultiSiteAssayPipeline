# Test config for the D:\temp\test_data sample dataset using bead-derived registration.
#
# This is the default bead-registration integration test for the provided
# folder layout:
#
#   D:\temp\test_data\data  -> sample data, contains WellF5 and WellF6
#   D:\temp\test_data\v2    -> bead data with __WellC2 filename suffixes
#
# The bead data is first converted to a BDV XML/H5 dataset, Fiji/BigStitcher
# registration is run on that bead XML, and the resulting bead XML is then used
# to generate the registered sample dataset for WellF5.

pipeline_settings:
  workflow: process_single_well
  well_id: F5
  bead_well_id: C2

processing:
  mode: "deskew_with_beads"

bead_data:
  type: "remote_scanning"
  input_path: D:\temp\test_data\v2
  output_path: D:\temp\test_data\bead_output_C2
  allow_wellless_filenames: false
  hardcoded_vars:
    pix_x: 0.35
    mirror_tilt: 17.5

data:
  input_path: D:\temp\test_data\data
  output_path: D:\temp\test_data\sample_output_F5_deskew_with_beads
  pattern: ''
  allow_wellless_filenames: false

deskewing:
  scan_type: "remote_scanning"
  hardcoded_vars:
    pix_x: 0.35
    mirror_tilt: 17.5

registration:
  auto_register: true
  registered_bead_xml_path: D:\temp\test_data\bead_output_C2\dataset_WellC2.xml

fusion:
  bdv_dataset_xml: D:\temp\test_data\sample_output_F5_deskew_with_beads\dataset_WellF5_registered.xml
  binning: 2

fiji_executable_path: C:\Users\User\Documents\GitHub\dopm_processing\fiji-2.9.0-win64\Fiji.app\ImageJ-win64.exe

# Test config for the D:\temp\test_data sample dataset without bead registration.
#
# This uses the sample folder:
#   D:\temp\test_data\data
#
# The sample data contains WellF5 and WellF6. This config processes only
# logical/sample well F5 and uses calculated geometric affines only.

pipeline_settings:
  workflow: process_single_well
  well_id: F5

processing:
  mode: "deskew"

data:
  input_path: D:\temp\test_data\data
  output_path: D:\temp\test_data\sample_output_F5_deskew
  pattern: ''
  allow_wellless_filenames: false

deskewing:
  scan_type: "remote_scanning"
  hardcoded_vars:
    pix_x: 0.35
    mirror_tilt: 17.5

fusion:
  bdv_dataset_xml: D:\temp\test_data\sample_output_F5_deskew\dataset_WellF5.xml
  binning: 2

fiji_executable_path: C:\Users\User\Documents\GitHub\dopm_processing\fiji-2.9.0-win64\Fiji.app\ImageJ-win64.exe
